<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trilha Santista</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <img src="img/Logo-header.png" alt="Logo da Trilha Santista" class="logo-header" width="220" height="auto">

      <form class="d-flex me-2 nav-actions" role="search" onsubmit="return false;">
        <input class="form-control me-2" id="buscar" type="search" placeholder="Pesquisar trilhas" aria-label="Pesquisar trilhas">
        <div id="lupa" aria-hidden="true"></div>
        <a href="teladeperfil.html" aria-label="Acessar perfil">
          <i class="fas fa-user img-perfil"></i>
        </a>
        <a href="Mapas-Trilhas/Mapa-Baixada-Santista.html" class="link-trilhas" aria-label="Acessar mapa das trilhas">
          <img src="img/localizacao-nav.png" width="92" id="location" alt="Localização">
        </a>
      </form>
    </div>
  </nav>

  <main class="container-fluid pb-5">
    <section id="ErroBusca" class="hide">
      <h1 class="text-center mt-4">Nenhuma trilha encontrada.</h1>
    </section>

    <section class="container mt-4">
      <div id="cardsContainer" class="container-card" aria-live="polite"></div>
    </section>
  </main>

  <div id="lightbox" class="lightbox hide" role="dialog" aria-modal="true" aria-label="Visualização ampliada da imagem">
    <button id="lightboxClose" class="lightbox-close" aria-label="Fechar imagem ampliada">×</button>
    <img id="lightboxImage" src="" alt="Imagem ampliada da trilha">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
  <script src="app.js" defer></script>
</body>

</html>
